<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vivid IDE Pro</title>
    <!-- CodeMirror 5 CDN Integration -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #08090c;
            --bg-sidebar: #0e1116;
            --bg-editor: #12141c;
            --bg-hover: #1b1f2b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --border: #1e293b;
            --live-panel-bg: #ffffff;
            --modal-bg: rgba(15, 23, 42, 0.9);
            --tabs-bg: #0b0d13;
            --theme-badge-bg: #1e293b;
            --theme-badge-text: #f1f5f9;
            --split-border: #2563eb;
        }

        [data-theme="light"] {
            --bg-dark: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-editor: #f8fafc;
            --bg-hover: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.1);
            --border: #cbd5e1;
            --live-panel-bg: #ffffff;
            --modal-bg: rgba(255, 255, 255, 0.95);
            --tabs-bg: #e2e8f0;
            --theme-badge-bg: #2563eb;
            --theme-badge-text: #ffffff;
            --split-border: #3b82f6;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0; left: 0;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* Premium Glass Header Bar */
        header {
            background-color: var(--bg-sidebar);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            background-color: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            background-color: var(--border);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-accent {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .btn-accent:hover {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        #file-title {
            font-size: 12px;
            color: var(--text-muted);
            font-family: ui-monospace, SFMono-Regular, monospace;
            background: var(--bg-dark);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Workspace Core Splits */
        .workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100% - 85px); /* Adjusted slightly for added panels stability */
            position: relative;
            overflow: hidden;
        }

        /* Sidebar Slide Layout */
        aside {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            z-index: 50;
        }

        aside.collapsed-sidebar {
            width: 0px;
            transform: translateX(-100%);
            border-right: none;
        }

        .sidebar-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex-grow: 1;
        }

        .sidebar-header {
            padding: 16px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-root { padding: 8px; }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 9px 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            gap: 10px;
            border-radius: 8px;
            margin-bottom: 3px;
            transition: all 0.15s ease;
            position: relative;
        }

        .tree-item:hover { background-color: var(--bg-hover); }
        .tree-item.active {
            background-color: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        /* Inline folder option shortcut trigger */
        .folder-plus-trigger {
            margin-left: auto;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
            transition: background 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .folder-plus-trigger:hover {
            background: var(--border);
        }

        .folder-children {
            padding-left: 12px;
            border-left: 1px dashed var(--border);
            margin-left: 20px;
        }
        .folder-children.collapsed { display: none; }

        /* Modern Tabs Interface Row Layout */
        .editor-container {
            flex-grow: 1;
            background-color: var(--bg-editor);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .tabs-bar {
            height: 40px;
            background-color: var(--tabs-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            align-items: flex-end;
            padding-left: 8px;
            flex-shrink: 0;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }

        .tab-item {
            height: 34px;
            padding: 0 16px;
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .tab-item:hover {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        .tab-item.active {
            background: var(--bg-editor);
            color: var(--accent);
            border-color: var(--border);
            font-weight: 600;
        }

        .tab-close {
            font-size: 14px;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .tab-close:hover {
            background: rgba(255,255,255,0.2);
            color: #ee4646;
        }

        .main-editor-split {
            display: flex;
            flex-grow: 1;
            height: calc(100% - 40px);
            position: relative;
        }

        main {
            flex-grow: 1;
            flex-basis: 50%;
            height: 100%;
            position: relative;
        }

        /* Split Window Feature Styles */
        .split-workspace-zone {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .split-editor-pane {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .split-editor-pane.active-pane {
            border: 1px solid var(--split-border);
        }

        .pane-header-title {
            background: var(--tabs-bg);
            padding: 4px 12px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* Asset Media Previewer styles */
        .asset-preview-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0b0e14;
            color: #94a3b8;
            padding: 20px;
        }

        .asset-preview-card {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .asset-preview-card img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 16px;
            background: repeating-conic-gradient(#1e293b 0% 25%, #0f172a 25% 50%) 0 0/20px 20px;
        }

        .asset-info-grid {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Live Preview Panel Frame Layout */
        #live-server-panel {
            flex-basis: 50%;
            height: 100%;
            background-color: var(--live-panel-bg);
            border-left: 1px solid var(--border);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        #live-server-panel.fullscreen-preview {
            position: fixed;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 2000;
        }

        .live-panel-header {
            background-color: var(--bg-sidebar);
            height: 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #live-preview-frame {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
            background: white;
        }

        .CodeMirror {
            height: 100% !important;
            width: 100% !important;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 15px;
            background-color: var(--bg-editor) !important;
        }

        /* Command Palette UI Overlay */
        .cmd-palette-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 10, 0.4);
            backdrop-filter: blur(4px);
            z-index: 6000;
            display: none;
            justify-content: center;
            padding-top: 50px;
        }

        .cmd-palette-box {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 550px;
            height: fit-content;
            max-height: 330px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .cmd-palette-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        .cmd-palette-results {
            overflow-y: auto;
            max-height: 260px;
            padding: 6px;
        }

        .cmd-item {
            padding: 10px 14px;
            font-size: 13.5px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }

        .cmd-item strong { color: var(--text-main); font-weight: 500; }
        .cmd-item:hover, .cmd-item.selected {
            background: var(--accent);
            color: #ffffff;
        }
        .cmd-item:hover strong, .cmd-item.selected strong { color: #ffffff; }

        /* High-End Glassmorphism Modal System */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.92);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-card { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal-description { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        
        .modal-input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            margin-bottom: 24px;
        }
        .modal-input:focus { border-color: var(--accent); }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 10px 20px; font-size: 13px; border-radius: 8px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
        .modal-btn-cancel { background: transparent; border-color: var(--border); color: var(--text-main); }
        .modal-btn-confirm { background: var(--accent); color: white; }
        .modal-btn-danger { background: #ef4444; color: white; }

        /* Sleek Workspace Status Bar Configuration */
        .status-bar {
            height: 30px;
            background-color: var(--bg-sidebar);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            flex-shrink: 0;
            z-index: 100;
        }
        .status-segment { display: flex; align-items: center; gap: 14px; }

        /* High Visibility Theme Badge Switcher Button */
        .theme-badge {
            background-color: var(--theme-badge-bg);
            color: var(--theme-badge-text);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        .theme-badge:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Custom Context Menus */
        .custom-menu {
            position: absolute;
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            padding: 6px 0;
            z-index: 1000;
            border-radius: 10px;
            min-width: 180px;
        }
        .menu-item {
            padding: 10px 16px; font-size: 13.5px; font-weight: 500; color: var(--text-main);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover { background-color: var(--accent); color: white; }
        .menu-item.disabled { opacity: 0.3; pointer-events: none; }

        /* Vector Icon Engine Injections */
        .ide-icon {
            width: 18px; height: 18px; display: inline-block;
            background-size: contain; background-repeat: no-repeat; background-position: center; flex-shrink: 0;
        }
        .icon-folder { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f59e0b"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>'); }
        .icon-html { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f97316"><path d="M5 2h14l-1.22 13.39L12 19.35l-5.78-3.95L5 2zm11.45 4.67H8.32l.17 1.83h7.79l-.26 2.82L12 12.63l-4.02-1.31-.09-1.03H6.06l.19 2.45L12 15.35l5.75-2.63.7-7.05z"/></svg>'); }
        .icon-css { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233b82f6"><path d="M5 2h14l-1.22 13.39L12 19.35l-5.78-3.95L5 2zm11.39 4.67H7.72l.19 2.05h8.29l-.26 2.72L12 12.75l-3.95-1.22-.09-.92H6.03l.18 2.37L12 15.47l5.79-2.72.6-6.08z"/></svg>'); }

        @media (max-width: 600px) {
            .main-editor-split { flex-direction: column; }
            #live-server-panel { flex-basis: 40%; border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <button id="btn-sidebar-toggle">☰ Sidebar</button>
            <button id="btn-new-folder">＋ Folder</button>
            <button id="btn-new-file">＋ File</button>
        </div>
        <div id="file-title">Vivid IDE Active</div>
        <div class="controls">
            <button id="btn-save" class="btn-accent">💾 Save Workspace</button>
        </div>
    </header>

    <div class="workspace">
        <aside id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-header">
                    <span>EXPLORER</span>
                </div>
                <div class="tree-root" id="explorer-root"></div>
            </div>
        </aside>

        <div class="editor-container">
            <div class="tabs-bar" id="tabs-container"></div>
            
            <div class="main-editor-split">
                <main id="editor-main">
                    <div class="split-workspace-zone" id="split-workspace-zone">
                        <!-- Primary Pane -->
                        <div class="split-editor-pane active-pane" id="pane-primary">
                            <div class="pane-header-title" id="pane-title-primary"><span>Primary Window</span></div>
                            <textarea id="editor" spellcheck="false"></textarea>
                        </div>
                        <!-- Secondary Pane (Hidden by Default) -->
                        <div class="split-editor-pane" id="pane-secondary" style="display: none; border-left: 1px solid var(--border);">
                            <div class="pane-header-title"><span>Split Pane view</span></div>
                            <textarea id="editor-secondary" spellcheck="false"></textarea>
                        </div>
                    </div>
                </main>
                
                <div id="live-server-panel">
                    <div class="live-panel-header">
                        <span>LIVE RENDER WINDOW</span>
                        <div style="display:flex; gap:6px;">
                            <button id="btn-fullscreen-live" style="padding:4px 8px; font-size:11px;">Full Screen</button>
                            <button id="btn-close-live" style="padding:4px 8px; font-size:11px; background:#ef4444; color:white; border-color:#ef4444;">Close</button>
                        </div>
                    </div>
                    <iframe id="live-preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- System Status Bar Layout -->
    <div class="status-bar">
        <div class="status-segment">
            <span id="status-mode">Mode: Plain Text</span>
            <span id="status-sync" style="color: #22c55e;">🟢 Sync Active</span>
        </div>
        <div class="status-segment">
            <span id="btn-theme-toggle" class="theme-badge">🌙 Switch Theme</span>
            <span>v2.0.0 Stable</span>
        </div>
    </div>

    <!-- Quick Command Palette UI Modal Overlay -->
    <div id="cmd-palette" class="cmd-palette-overlay">
        <div class="cmd-palette-box">
            <input type="text" id="cmd-input" class="cmd-palette-input" placeholder="Type an IDE action shortcut... (e.g. Go Live)" autocomplete="off" spellcheck="false">
            <div id="cmd-results" class="cmd-palette-results"></div>
        </div>
    </div>

    <!-- Custom Modals System -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <div id="modal-title" class="modal-title">Create New Item</div>
            <div id="modal-desc" class="modal-description">Please enter a valid item name.</div>
            <input type="text" id="modal-input" class="modal-input" spellcheck="false" autocomplete="off">
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Dynamic Context Menus -->
    <div id="context-menu" class="custom-menu">
        <div class="menu-item" id="ctx-new-file">New File...</div>
        <div class="menu-item" id="ctx-rename">Rename...</div>
        <div class="menu-item" id="ctx-live" style="color: #22c55e; font-weight: bold; display: none;">Go Live 🟢</div>
        <div class="menu-item" id="ctx-delete" style="color: #ef4444;">Delete</div>
    </div>

    <div id="editor-context-menu" class="custom-menu">
        <div class="menu-item" id="edit-ctx-copy">Copy</div>
        <div class="menu-item" id="edit-ctx-cut">Cut</div>
        <div class="menu-item" id="edit-ctx-paste">Paste</div>
        <div class="menu-item" id="edit-ctx-selectall">Select All</div>
        <div id="editor-ctx-separator" style="border-top:1px solid var(--border); margin:4px 0; display:none;"></div>
        <div class="menu-item" id="edit-ctx-live" style="color: #22c55e; font-weight: bold; display: none;">Go Live 🟢</div>
    </div>

    <script>
        let fsData = JSON.parse(localStorage.getItem('v_ide_fs')) || {
            root: { id: 'root', type: 'folder', name: 'Workspace', children: [] }
        };

        let openTabs = JSON.parse(localStorage.getItem('v_ide_tabs')) || [];
        let activeFileId = localStorage.getItem('v_ide_active_tab_id') || null;

        let rightClickedItemId = null;
        let currentTheme = localStorage.getItem('v_ide_theme') || 'dark';
        let liveServerActive = false;
        let updateTimeout = null;
        let modalResolveCallback = null;
        
        // Split Window State Variables
        let splitViewMode = false;
        let secondaryFileId = null;

        const explorerRoot = document.getElementById('explorer-root');
        const fileTitle = document.getElementById('file-title');
        const contextMenu = document.getElementById('context-menu');
        const editorContextMenu = document.getElementById('editor-context-menu');
        const themeToggleBtn = document.getElementById('btn-theme-toggle');
        const sidebar = document.getElementById('sidebar');
        const btnSidebarToggle = document.getElementById('btn-sidebar-toggle');
        const tabsContainer = document.getElementById('tabs-container');
        const statusMode = document.getElementById('status-mode');
        
        const liveServerPanel = document.getElementById('live-server-panel');
        const livePreviewFrame = document.getElementById('live-preview-frame');
        const btnCloseLive = document.getElementById('btn-close-live');
        const btnFullscreenLive = document.getElementById('btn-fullscreen-live');

        const customModal = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalInput = document.getElementById('modal-input');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');

        // Command Palette Elements
        const cmdPalette = document.getElementById('cmd-palette');
        const cmdInput = document.getElementById('cmd-input');
        const cmdResults = document.getElementById('cmd-results');

        // Main Primary Editor Setup
        const cmInstance = CodeMirror.fromTextArea(document.getElementById('editor'), {
            lineNumbers: true,
            mode: "htmlmixed",
            theme: currentTheme === 'dark' ? 'monokai' : 'neo',
            lineWrapping: true, 
            inputStyle: "contenteditable"
        });

        // Split Editor Pane Setup
        const cmSecondary = CodeMirror.fromTextArea(document.getElementById('editor-secondary'), {
            lineNumbers: true,
            mode: "htmlmixed",
            theme: currentTheme === 'dark' ? 'monokai' : 'neo',
            lineWrapping: true,
            inputStyle: "contenteditable"
        });

        cmInstance.on("focus", () => { window.scrollTo(0, 0); });
        cmInstance.on("change", () => {
            window.scrollTo(0, 0);
            if (activeFileId) {
                const targetNode = findNode(activeFileId);
                if (targetNode) targetNode.content = cmInstance.getValue();
            }
            if (liveServerActive) {
                clearTimeout(updateTimeout);
                updateTimeout = setTimeout(updateLiveServer, 400);
            }
        });

        cmSecondary.on("change", () => {
            if (secondaryFileId) {
                const targetNode = findNode(secondaryFileId);
                if (targetNode) targetNode.content = cmSecondary.getValue();
            }
            if (liveServerActive) {
                clearTimeout(updateTimeout);
                updateTimeout = setTimeout(updateLiveServer, 400);
            }
        });

        btnSidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed-sidebar');
            setTimeout(() => {
                cmInstance.refresh();
                cmSecondary.refresh();
            }, 310);
        });

        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('v_ide_theme', theme);
            cmInstance.setOption('theme', theme === 'dark' ? 'monokai' : 'neo');
            cmSecondary.setOption('theme', theme === 'dark' ? 'monokai' : 'neo');
            themeToggleBtn.innerHTML = theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
        }
        themeToggleBtn.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));
        setTheme(currentTheme); 

        function openCustomModal(title, description, defaultValue = '', isDanger = false) {
            return new Promise((resolve) => {
                modalTitle.textContent = title;
                modalDesc.textContent = description;
                modalInput.value = defaultValue;
                modalInput.style.display = description.includes('delete') ? 'none' : 'block';
                modalConfirmBtn.className = 'modal-btn ' + (isDanger ? 'modal-btn-danger' : 'modal-btn-confirm');
                customModal.classList.add('active');
                if (modalInput.style.display !== 'none') setTimeout(() => modalInput.focus(), 50);
                modalResolveCallback = resolve;
            });
        }

        function closeCustomModal(value = null) {
            customModal.classList.remove('active');
            if (modalResolveCallback) {
                modalResolveCallback(value);
                modalResolveCallback = null;
            }
        }

        modalConfirmBtn.addEventListener('click', () => closeCustomModal(modalInput.style.display === 'none' ? true : modalInput.value.trim()));
        modalCancelBtn.addEventListener('click', () => closeCustomModal(null));
        modalInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') modalConfirmBtn.click(); else if(e.key === 'Escape') modalCancelBtn.click(); });

        function renderTabs() {
            tabsContainer.innerHTML = '';
            openTabs.forEach(id => {
                const node = findNode(id);
                if (!node) return;

                const tab = document.createElement('div');
                tab.className = `tab-item ${id === activeFileId ? 'active' : ''}`;
                
                const label = document.createElement('span');
                label.textContent = node.name;
                label.addEventListener('click', () => selectFile(id));

                const closeBtn = document.createElement('span');
                closeBtn.className = 'tab-close';
                closeBtn.innerHTML = '×';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(id);
                });

                tab.appendChild(label);
                tab.appendChild(closeBtn);
                tabsContainer.appendChild(tab);
            });
            localStorage.setItem('v_ide_tabs', JSON.stringify(openTabs));
            localStorage.setItem('v_ide_active_tab_id', activeFileId);
        }

        function closeTab(id) {
            openTabs = openTabs.filter(t => t !== id);
            if (activeFileId === id) {
                activeFileId = openTabs.length ? openTabs[openTabs.length - 1] : null;
            }
            if (secondaryFileId === id) {
                secondaryFileId = null;
                document.getElementById('pane-secondary').style.display = 'none';
                splitViewMode = false;
            }
            if (activeFileId) {
                selectFile(activeFileId);
            } else {
                cmInstance.setValue('');
                fileTitle.textContent = 'Vivid IDE Active';
                statusMode.textContent = 'Mode: Plain Text';
            }
            renderTabs();
            renderTree();
        }

        // Live Server Navigation Message Listener Engine
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'LIVE_SERVER_NAVIGATE') {
                const targetNode = findSiblingByName(e.data.fileName);
                if (targetNode && targetNode.type === 'file') {
                    selectFile(targetNode.id);
                }
            }
        });

        function updateLiveServer() {
            if (!activeFileId || !liveServerActive) return;
            const currentFile = findNode(activeFileId);
            if (!currentFile) return;

            let codeContent = currentFile.content || '';
            let extension = currentFile.name.split('.').pop().toLowerCase();

            if (extension === 'html') {
                let parsedDOM = new DOMParser().parseFromString(codeContent, 'text/html');
                
                // Bundle inside stylesheets 
                parsedDOM.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                    let href = link.getAttribute('href');
                    if (href && !href.startsWith('http')) {
                        let sibling = findSiblingByName(href);
                        if (sibling && sibling.type === 'file') {
                            let styleTag = parsedDOM.createElement('style');
                            styleTag.textContent = sibling.content || '';
                            link.replaceWith(styleTag);
                        }
                    }
                });

                // Bundle scripts
                parsedDOM.querySelectorAll('script[src]').forEach(script => {
                    let src = script.getAttribute('src');
                    if (src && !src.startsWith('http')) {
                        let sibling = findSiblingByName(src);
                        if (sibling && sibling.type === 'file') {
                            let newScript = parsedDOM.createElement('script');
                            newScript.textContent = sibling.content || '';
                            script.replaceWith(newScript);
                        }
                    }
                });

                // Inject a link/click listener inside the iframe to navigate internally inside the IDE
                let runtimeInterceptor = parsedDOM.createElement('script');
                runtimeInterceptor.textContent = `
                    document.addEventListener('click', (e) => {
                        let targetElement = e.target.closest('a, button, [href]');
                        if (!targetElement) return;
                        
                        let locationPath = targetElement.getAttribute('href') || targetElement.getAttribute('onclick');
                        if (locationPath && !locationPath.startsWith('http') && !locationPath.startsWith('#') && !locationPath.startsWith('javascript:')) {
                            e.preventDefault();
                            // Clean relative syntax tags out
                            let targetFileName = locationPath.split('/').pop();
                            window.parent.postMessage({ type: 'LIVE_SERVER_NAVIGATE', fileName: targetFileName }, '*');
                        }
                    });
                `;
                parsedDOM.body.appendChild(runtimeInterceptor);
                codeContent = parsedDOM.documentElement.outerHTML;
            }

            const blob = new Blob([codeContent], { type: 'text/html' });
            const oldUrl = livePreviewFrame.src;
            livePreviewFrame.src = URL.createObjectURL(blob);
            if (oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
        }

        function findSiblingByName(name, node = fsData.root) {
            if (node.type === 'file' && node.name === name) return node;
            if (node.children) {
                for (let child of node.children) {
                    let found = findSiblingByName(name, child);
                    if (found) return found;
                }
            }
            return null;
        }

        function toggleLiveServer() {
            liveServerActive = !liveServerActive;
            if (liveServerActive) {
                liveServerPanel.style.display = 'flex';
                updateLiveServer();
            } else {
                liveServerPanel.style.display = 'none';
                liveServerPanel.classList.remove('fullscreen-preview');
                livePreviewFrame.src = 'about:blank';
            }
            cmInstance.refresh();
            cmSecondary.refresh();
        }

        btnCloseLive.addEventListener('click', toggleLiveServer);
        btnFullscreenLive.addEventListener('click', () => {
            liveServerPanel.classList.toggle('fullscreen-preview');
        });

        // Enhanced Vector Icon Mapping Extension Engine
        function getIconClass(name, type) {
            if (type === 'folder') return 'icon-folder';
            let ext = name.split('.').pop().toLowerCase();
            if (ext === 'html' || ext === 'htm') return 'icon-html';
            if (ext === 'css') return 'icon-css';
            if (ext === 'js') return 'icon-js';
            if (ext === 'json') return 'icon-json';
            if (ext === 'md') return 'icon-md';
            if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) return 'icon-image';
            return 'icon-unknown';
        }

        const editorElement = document.querySelector('.CodeMirror');
        const triggerEditorMenu = (e, clientX, clientY) => {
            e.preventDefault(); e.stopPropagation(); hideContextMenu();
            const liveOption = document.getElementById('edit-ctx-live');
            if (activeFileId) {
                const activeFile = findNode(activeFileId);
                if (activeFile && activeFile.name.split('.').pop().toLowerCase() === 'html') {
                    liveOption.style.display = 'flex';
                } else {
                    liveOption.style.display = 'none';
                }
            }
            editorContextMenu.style.left = `${clientX}px`;
            editorContextMenu.style.top = `${clientY}px`;
            editorContextMenu.style.display = 'flex';
        };

        editorElement.addEventListener('contextmenu', (e) => triggerEditorMenu(e, e.clientX, e.clientY));

        function saveToStorage() {
            localStorage.setItem('v_ide_fs', JSON.stringify(fsData));
        }

        function generateId() { return 'node_' + Math.random().toString(36).substr(2, 9); }

        function findNode(id, node = fsData.root) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    let found = findNode(id, child);
                    if (found) return found;
                }
            }
            return null;
        }

        function deleteNode(id, node = fsData.root) {
            if (!node.children) return false;
            const index = node.children.findIndex(child => child.id === id);
            if (index !== -1) { node.children.splice(index, 1); return true; }
            for (let child of node.children) { if (deleteNode(id, child)) return true; }
            return false;
        }

        function renderTree() {
            explorerRoot.innerHTML = '';
            fsData.root.children.forEach(child => explorerRoot.appendChild(createDOMNode(child)));
        }

        function createDOMNode(node) {
            const container = document.createElement('div');
            const item = document.createElement('div');
            item.className = `tree-item ${node.type === 'folder' ? 'tree-folder' : 'tree-file'}`;
            if (node.id === activeFileId) item.classList.add('active');
            item.dataset.id = node.id;
            
            const icon = document.createElement('span');
            icon.className = `ide-icon ${getIconClass(node.name, node.type)}`;
            
            const label = document.createElement('span');
            label.textContent = node.name;
            
            item.appendChild(icon);
            item.appendChild(label);
            container.appendChild(item);

            if (node.type === 'folder') {
                // Add explicit inline shortcut options panel trigger button
                const plusBtn = document.createElement('span');
                plusBtn.className = 'folder-plus-trigger';
                plusBtn.textContent = '➕';
                plusBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); e.preventDefault();
                    hideContextMenu();
                    const rect = plusBtn.getBoundingClientRect();
                    showContextMenu(rect.left, rect.bottom, node.id);
                });
                item.appendChild(plusBtn);

                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'folder-children';
                if (node.collapsed) childrenContainer.classList.add('collapsed');
                node.children.forEach(child => childrenContainer.appendChild(createDOMNode(child)));
                container.appendChild(childrenContainer);

                item.addEventListener('click', () => {
                    node.collapsed = !node.collapsed;
                    childrenContainer.classList.toggle('collapsed');
                    saveToStorage();
                });
            } else {
                item.addEventListener('click', () => selectFile(node.id));
            }

            item.addEventListener('contextmenu', (e) => {
                e.preventDefault(); e.stopPropagation(); hideContextMenu();
                showContextMenu(e.clientX, e.clientY, node.id);
            });

            return container;
        }

        // Dual File Split Viewer + Interactive Asset Media Preview Logic
        function selectFile(id, isSecondary = false) {
            const file = findNode(id);
            if (!file) return;

            if (!isSecondary) {
                activeFileId = id;
                if (!openTabs.includes(id)) openTabs.push(id);
            } else {
                secondaryFileId = id;
            }
            
            let ext = file.name.split('.').pop().toLowerCase();
            let targetMode = "htmlmixed";
            if (ext === "js") targetMode = "javascript";
            if (ext === "css") targetMode = "css";
            if (ext === "json") targetMode = "javascript";

            const primaryPane = document.getElementById('pane-primary');
            const secondaryPane = document.getElementById('pane-secondary');
            const targetPane = isSecondary ? secondaryPane : primaryPane;
            const targetInstance = isSecondary ? cmSecondary : cmInstance;

            // Media Ext Asset Detector Rule Interceptor
            if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) {
                // Remove CodeMirror display if present
                targetPane.querySelector('.CodeMirror').style.visibility = 'hidden';
                let oldPreview = targetPane.querySelector('.asset-preview-container');
                if (oldPreview) oldPreview.remove();

                let mockSource = ext === 'svg' 
                    ? `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="%233b82f6"><circle cx="12" cy="12" r="10"/></svg>`
                    : `https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&auto=format&fit=crop&q=60`;

                let previewElement = document.createElement('div');
                previewElement.className = 'asset-preview-container';
                previewElement.innerHTML = `
                    <div class="asset-preview-card">
                        <img src="${mockSource}" alt="Asset File">
                        <div class="asset-info-grid">
                            <p><strong>Name:</strong> ${file.name}</p>
                            <p><strong>Dimensions:</strong> 512 × 512 px</p>
                            <p><strong>Type:</strong> Image/${ext.toUpperCase()}</p>
                        </div>
                    </div>
                `;
                targetPane.appendChild(previewElement);
            } else {
                // Restore standard script text viewports
                targetPane.querySelector('.CodeMirror').style.visibility = 'visible';
                let previewZone = targetPane.querySelector('.asset-preview-container');
                if (previewZone) previewZone.remove();

                targetInstance.setOption("mode", targetMode);
                targetInstance.setValue(file.content || '');
            }

            if (!isSecondary) {
                fileTitle.textContent = file.name;
                statusMode.textContent = `Mode: ${ext.toUpperCase()}`;
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`[data-id="${id}"]`);
                if (activeEl) activeEl.classList.add('active');
                saveToStorage();
                renderTabs();
                if (liveServerActive) updateLiveServer();
            }
        }

        async function createNewItem(type, parentId = 'root') {
            const name = await openCustomModal(`New ${type === 'folder' ? 'Folder' : 'File'}`, `Enter a name:`, type === 'file' ? 'index.html' : 'components');
            if (!name) return;

            const targetParent = findNode(parentId);
            if (!targetParent) return;

            const newItem = { id: generateId(), type: type, name: name, ...(type === 'folder' ? { children: [], collapsed: false } : { content: '' }) };
            targetParent.children.push(newItem);
            saveToStorage();
            renderTree();
            if (type === 'file') selectFile(newItem.id);
        }

        function showContextMenu(x, y, itemId) {
            rightClickedItemId = itemId;
            const targetNode = findNode(itemId);
            const newFileOption = document.getElementById('ctx-new-file');
            const liveOption = document.getElementById('ctx-live');
            
            newFileOption.style.display = targetNode.type === 'file' ? 'none' : 'flex';
            if (targetNode.type === 'file' && targetNode.name.split('.').pop().toLowerCase() === 'html') {
                liveOption.style.display = 'flex';
            } else {
                liveOption.style.display = 'none';
            }

            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMenu.style.display = 'flex';
        }

        function hideContextMenu() {
            contextMenu.style.display = 'none';
            editorContextMenu.style.display = 'none';
        }

        document.getElementById('btn-new-folder').addEventListener('click', () => createNewItem('folder', 'root'));
        document.getElementById('btn-new-file').addEventListener('click', () => createNewItem('file', 'root'));
        
        document.getElementById('btn-save').addEventListener('click', () => {
            if (activeFileId) {
                const file = findNode(activeFileId);
                if (file) { file.content = cmInstance.getValue(); saveToStorage(); }
            }
            if (secondaryFileId) {
                const fileSec = findNode(secondaryFileId);
                if (fileSec) { fileSec.content = cmSecondary.getValue(); saveToStorage(); }
            }
        });

        document.getElementById('ctx-new-file').addEventListener('click', () => { createNewItem('file', rightClickedItemId); hideContextMenu(); });
        document.getElementById('ctx-live').addEventListener('click', () => { selectFile(rightClickedItemId); toggleLiveServer(); hideContextMenu(); });

        document.getElementById('ctx-rename').addEventListener('click', async () => {
            const targetNode = findNode(rightClickedItemId);
            if (targetNode) {
                const newName = await openCustomModal("Rename", "Enter a new name for this asset:", targetNode.name);
                if (newName) {
                    targetNode.name = newName;
                    if (activeFileId === rightClickedItemId) fileTitle.textContent = newName;
                    saveToStorage(); renderTree(); renderTabs();
                }
            }
            hideContextMenu();
        });

        document.getElementById('ctx-delete').addEventListener('click', async () => {
            if (await openCustomModal("Confirm Delete", "Are you sure you want to permanently delete this item?", '', true)) {
                deleteNode(rightClickedItemId);
                closeTab(rightClickedItemId);
            }
            hideContextMenu();
        });

        document.getElementById('edit-ctx-copy').addEventListener('click', () => { document.execCommand('copy'); hideContextMenu(); });
        document.getElementById('edit-ctx-cut').addEventListener('click', () => { document.execCommand('cut'); hideContextMenu(); });
        document.getElementById('edit-ctx-selectall').addEventListener('click', () => { cmInstance.execCommand('selectAll'); hideContextMenu(); });
        document.getElementById('edit-ctx-live').addEventListener('click', () => { toggleLiveServer(); hideContextMenu(); });
        document.getElementById('edit-ctx-paste').addEventListener('click', async () => {
            try { const text = await navigator.clipboard.readText(); cmInstance.replaceSelection(text); } catch (err) {}
            hideContextMenu();
        });

        // Command Palette Action Shortcuts Engine Array
        const commandsList = [
            { name: "Switch Theme", desc: "Toggle between workspace Dark/Light profiles", action: () => themeToggleBtn.click() },
            { name: "Go Live", desc: "Toggle interactive dual-render preview window frame", action: () => toggleLiveServer() },
            { name: "New File", desc: "Instantiate a new structural text/code file asset", action: () => createNewItem('file', 'root') },
            { name: "New Folder", desc: "Generate a clean dynamic directory branch structural point", action: () => createNewItem('folder', 'root') },
            { name: "Clear Editor", desc: "Flushes text content from active open editor", action: () => cmInstance.setValue('') }
        ];

        let selectedCmdIndex = 0;

        function showCommandPalette() {
            cmdPalette.style.display = 'flex';
            cmdInput.value = '';
            cmdInput.focus();
            renderCommandItems(commandsList);
        }

        function hideCommandPalette() {
            cmdPalette.style.display = 'none';
        }

        function renderCommandItems(filteredList) {
            cmdResults.innerHTML = '';
            if (filteredList.length === 0) {
                cmdResults.innerHTML = `<div style="padding:12px; font-size:13px; color:var(--text-muted);">No actions found matching search term.</div>`;
                return;
            }
            filteredList.forEach((cmd, index) => {
                const row = document.createElement('div');
                row.className = `cmd-item ${index === selectedCmdIndex ? 'selected' : ''}`;
                row.innerHTML = `<strong>&gt; ${cmd.name}</strong> <span>${cmd.desc}</span>`;
                row.addEventListener('click', () => {
                    cmd.action();
                    hideCommandPalette();
                });
                cmdResults.appendChild(row);
            });
        }

        cmdInput.addEventListener('input', () => {
            let term = cmdInput.value.toLowerCase();
            let matches = commandsList.filter(c => c.name.toLowerCase().includes(term) || c.desc.toLowerCase().includes(term));
            selectedCmdIndex = 0;
            renderCommandItems(matches);
        });

        cmdInput.addEventListener('keydown', (e) => {
            let items = cmdResults.querySelectorAll('.cmd-item');
            let term = cmdInput.value.toLowerCase();
            let matches = commandsList.filter(c => c.name.toLowerCase().includes(term) || c.desc.toLowerCase().includes(term));

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedCmdIndex = (selectedCmdIndex + 1) % matches.length;
                renderCommandItems(matches);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedCmdIndex = (selectedCmdIndex - 1 + matches.length) % matches.length;
                renderCommandItems(matches);
            } else if (e.key === 'Enter') {
                if (matches[selectedCmdIndex]) {
                    matches[selectedCmdIndex].action();
                    hideCommandPalette();
                }
            } else if (e.key === 'Escape') {
                hideCommandPalette();
            }
        });

        // Window Global Short-circuit Handler Keybindings Engine
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'p') {
                e.preventDefault();
                if (cmdPalette.style.display === 'flex') hideCommandPalette(); else showCommandPalette();
            }
        });

        cmdPalette.addEventListener('click', (e) => {
            if (e.target === cmdPalette) hideCommandPalette();
        });

        window.addEventListener('click', hideContextMenu);
        window.addEventListener('blur', hideContextMenu);

        renderTree();
        if (activeFileId && findNode(activeFileId)) {
            selectFile(activeFileId);
        }
    </script>
</body>
</html>
