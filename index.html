<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web IDE Pro</title>
    <!-- CodeMirror 5 CDN for light/dark syntax highlighting, touch responsiveness, and mobile scrolling -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #181818;
            --bg-sidebar: #202020;
            --bg-editor: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #858585;
            --accent: #007acc;
            --border: #333333;
            --live-panel-bg: #ffffff;
        }

        [data-theme="light"] {
            --bg-dark: #e0e0e0;
            --bg-sidebar: #f3f3f3;
            --bg-editor: #ffffff;
            --bg-hover: #e4e4e7;
            --text-main: #1f1f1f;
            --text-muted: #6e6e73;
            --accent: #007acc;
            --border: #cccccc;
            --live-panel-bg: #ffffff;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-sidebar);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            gap: 6px;
        }

        button, .toggle-theme-btn {
            background-color: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        button:active, .toggle-theme-btn:active {
            background-color: var(--accent);
            color: white;
        }

        #file-title {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
            max-width: 40%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100% - 50px);
            position: relative;
            overflow: hidden;
        }

        aside {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: transform 0.2s ease-in-out;
            flex-shrink: 0;
            z-index: 5;
        }

        .sidebar-content {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex-grow: 1;
        }

        .sidebar-header {
            padding: 12px 14px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .tree-root {
            padding: 6px 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            gap: 8px;
        }

        .tree-item:hover {
            background-color: var(--bg-hover);
        }

        .tree-item.active {
            background-color: var(--accent);
            color: white;
        }

        .tree-folder {
            font-weight: 500;
        }

        .folder-children {
            padding-left: 16px;
            display: block;
        }

        .folder-children.collapsed {
            display: none;
        }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid var(--border);
            background-color: var(--bg-sidebar);
            display: flex;
        }

        .toggle-theme-btn {
            width: 100%;
            text-align: center;
        }

        /* Editor and Live Preview Wrapper Layout */
        .editor-container {
            flex-grow: 1;
            background-color: var(--bg-editor);
            position: relative;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: row;
        }

        main {
            flex-grow: 1;
            flex-basis: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Live Preview Window Frame Panel */
        #live-server-panel {
            flex-basis: 50%;
            height: 100%;
            background-color: var(--live-panel-bg);
            border-left: 2px solid var(--border);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .live-panel-header {
            background-color: var(--bg-sidebar);
            height: 35px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .live-panel-header button {
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
        }

        #live-preview-frame {
            width: 100%;
            height: calc(100% - 35px);
            border: none;
            background-color: white;
        }

        .CodeMirror {
            height: 100% !important;
            width: 100% !important;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 15px;
            background-color: var(--bg-editor) !important;
        }

        .CodeMirror-scroll {
            height: 100%;
            overflow-y: auto !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch;
        }

        /* Context Menu Overlay adjustments */
        .custom-menu {
            position: absolute;
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border);
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            padding: 4px 0;
            z-index: 1000;
            border-radius: 6px;
            min-width: 160px;
        }

        .menu-item {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:hover {
            background-color: var(--accent);
            color: white;
        }
        
        .menu-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .menu-shortcut {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .icon-folder::before { content: "📁"; }
        .icon-file::before { content: "📄"; }

        @media (max-width: 600px) {
            aside {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            aside.open {
                transform: translateX(0);
                box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            }
            .editor-container {
                flex-direction: column;
            }
            #live-server-panel {
                flex-basis: 40%;
                border-left: none;
                border-top: 2px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <button id="btn-toggle-menu" style="display: none;">📁 Menu</button>
            <button id="btn-new-folder">New Folder</button>
            <button id="btn-new-file">New File</button>
            <button id="btn-save">Save</button>
        </div>
        <div id="file-title">No file open</div>
    </header>

    <div class="workspace">
        <aside id="sidebar">
            <div class="sidebar-content">
                <div class="sidebar-header">EXPLORER</div>
                <div class="tree-root" id="explorer-root"></div>
            </div>
            <div class="sidebar-footer">
                <button class="toggle-theme-btn" id="btn-theme-toggle">Light Mode</button>
            </div>
        </aside>

        <div class="editor-container">
            <main id="editor-main">
                <textarea id="editor" spellcheck="false"></textarea>
            </main>
            
            <!-- Live Server Render Panel Layout -->
            <div id="live-server-panel">
                <div class="live-panel-header">
                    <span>LIVE SERVER PREVIEW</span>
                    <button id="btn-close-live">Close</button>
                </div>
                <iframe id="live-preview-frame" sandbox="allow-scripts allow-modals"></iframe>
            </div>
        </div>
    </div>

    <!-- Tree Explorer Context Menu -->
    <div id="context-menu" class="custom-menu">
        <div class="menu-item" id="ctx-new-file">New File...</div>
        <div class="menu-item" id="ctx-rename">Rename...</div>
        <div class="menu-item" id="ctx-delete" style="color: #f85149;">Delete</div>
    </div>

    <!-- Editor Workspace Dedicated Context Menu -->
    <div id="editor-context-menu" class="custom-menu">
        <div class="menu-item" id="edit-ctx-copy">Copy <span class="menu-shortcut">Ctrl+C</span></div>
        <div class="menu-item" id="edit-ctx-cut">Cut <span class="menu-shortcut">Ctrl+X</span></div>
        <div class="menu-item" id="edit-ctx-paste">Paste <span class="menu-shortcut">Ctrl+V</span></div>
        <div class="menu-item" id="edit-ctx-selectall">Select All <span class="menu-shortcut">Ctrl+A</span></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
        <div class="menu-item" id="edit-ctx-live" style="color: #4ade80; font-weight: bold;">Go Live 🟢</div>
    </div>

    <script>
        let fsData = JSON.parse(localStorage.getItem('v_ide_fs')) || {
            root: { id: 'root', type: 'folder', name: 'Workspace', children: [] }
        };

        let activeFileId = null;
        let rightClickedItemId = null;
        let currentTheme = localStorage.getItem('v_ide_theme') || 'dark';
        let liveServerActive = false;
        let updateTimeout = null;

        const explorerRoot = document.getElementById('explorer-root');
        const fileTitle = document.getElementById('file-title');
        const contextMenu = document.getElementById('context-menu');
        const editorContextMenu = document.getElementById('editor-context-menu');
        const themeToggleBtn = document.getElementById('btn-theme-toggle');
        const sidebar = document.getElementById('sidebar');
        const toggleMenuBtn = document.getElementById('btn-toggle-menu');
        
        const liveServerPanel = document.getElementById('live-server-panel');
        const livePreviewFrame = document.getElementById('live-preview-frame');
        const btnCloseLive = document.getElementById('btn-close-live');

        const cmInstance = CodeMirror.fromTextArea(document.getElementById('editor'), {
            lineNumbers: true,
            mode: "htmlmixed",
            theme: currentTheme === 'dark' ? 'monokai' : 'neo',
            lineWrapping: true, 
            inputStyle: "contenteditable"
        });

        cmInstance.on("focus", () => {
            window.scrollTo(0, 0);
        });
        
        // Debounced compilation update pipeline for Live Server rendering loops
        cmInstance.on("change", () => {
            window.scrollTo(0, 0);
            if (liveServerActive) {
                clearTimeout(updateTimeout);
                updateTimeout = setTimeout(updateLiveServer, 400);
            }
        });

        function evaluateViewportWidth() {
            if (window.innerWidth <= 600) {
                toggleMenuBtn.style.display = 'inline-block';
            } else {
                toggleMenuBtn.style.display = 'none';
                sidebar.classList.remove('open');
            }
        }
        window.addEventListener('resize', evaluateViewportWidth);
        evaluateViewportWidth();

        toggleMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 600 && !sidebar.contains(e.target) && e.target !== toggleMenuBtn) {
                sidebar.classList.remove('open');
            }
        });

        function setTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('v_ide_theme', theme);
            
            if (theme === 'dark') {
                cmInstance.setOption('theme', 'monokai');
                themeToggleBtn.textContent = 'Light Mode';
            } else {
                cmInstance.setOption('theme', 'neo');
                themeToggleBtn.textContent = 'Dark Mode';
            }
        }
        themeToggleBtn.addEventListener('click', () => {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
        setTheme(currentTheme); 

        // Live Server Dependency Assembly Pipeline 
        function updateLiveServer() {
            if (!activeFileId || !liveServerActive) return;
            
            const currentFile = findNode(activeFileId);
            if (!currentFile) return;

            // Compilation parser mapping internal CSS/JS reference paths to dynamic source outputs
            let codeContent = cmInstance.getValue();
            let extension = currentFile.name.split('.').pop().toLowerCase();

            if (extension === 'html') {
                // Parse and inject project siblings inline to emulate real multi-file resolution
                let parsedDOM = new DOMParser().parseFromString(codeContent, 'text/html');
                
                // CSS Sheet dependency injection
                parsedDOM.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                    let href = link.getAttribute('href');
                    if (href && !href.startsWith('http')) {
                        let sibling = findSiblingByName(href);
                        if (sibling && sibling.type === 'file') {
                            let styleTag = parsedDOM.createElement('style');
                            styleTag.textContent = sibling.content || '';
                            link.replaceWith(styleTag);
                        }
                    }
                });

                // Script block dependency injection
                parsedDOM.querySelectorAll('script[src]').forEach(script => {
                    let src = script.getAttribute('src');
                    if (src && !src.startsWith('http')) {
                        let sibling = findSiblingByName(src);
                        if (sibling && sibling.type === 'file') {
                            let newScript = parsedDOM.createElement('script');
                            newScript.textContent = sibling.content || '';
                            script.replaceWith(newScript);
                        }
                    }
                });

                codeContent = parsedDOM.documentElement.outerHTML;
            } else if (extension === 'css') {
                codeContent = `<style>${codeContent}</style><div style='padding:10px;font-family:sans-serif;color:#888;'>CSS Source File Live Preview Active</div>`;
            } else if (extension === 'js') {
                codeContent = `<script>${codeContent}<\/script><div style='padding:10px;font-family:sans-serif;color:#888;'>JS Source File Execution Output Layer View Active. Open logs to view stack tracking metrics.</div>`;
            }

            // Safe Blob generation loop to decouple workspace sandbox executions securely
            const blob = new Blob([codeContent], { type: 'text/html' });
            const oldUrl = livePreviewFrame.src;
            livePreviewFrame.src = URL.createObjectURL(blob);
            if (oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
        }

        function findSiblingByName(name) {
            if (!fsData.root.children) return null;
            // Evaluates direct local level workspace files
            return fsData.root.children.find(child => child.name === name);
        }

        function toggleLiveServer() {
            liveServerActive = !liveServerActive;
            if (liveServerActive) {
                liveServerPanel.style.display = 'flex';
                updateLiveServer();
            } else {
                liveServerPanel.style.display = 'none';
                livePreviewFrame.src = 'about:blank';
            }
            cmInstance.refresh();
        }

        btnCloseLive.addEventListener('click', toggleLiveServer);

        // Editor Context Operations Context Menu Interface Handler
        const editorElement = document.querySelector('.CodeMirror');
        
        const triggerEditorMenu = (e, clientX, clientY) => {
            e.preventDefault();
            e.stopPropagation();
            hideContextMenu();

            const hasSelection = cmInstance.somethingSelected();
            
            // Toggle element configurations contextually relative to user text selection highlights
            if (hasSelection) {
                document.getElementById('edit-ctx-copy').classList.remove('disabled');
                document.getElementById('edit-ctx-cut').classList.remove('disabled');
            } else {
                document.getElementById('edit-ctx-copy').classList.add('disabled');
                document.getElementById('edit-ctx-cut').classList.add('disabled');
            }

            editorContextMenu.style.left = `${clientX}px`;
            editorContextMenu.style.top = `${clientY}px`;
            editorContextMenu.style.display = 'flex';
        };

        editorElement.addEventListener('contextmenu', (e) => triggerEditorMenu(e, e.clientX, e.clientY));

        // Touch long press integration directly targeting the CodeMirror tracking window
        let editorPressTimer;
        editorElement.addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) {
                editorPressTimer = setTimeout(() => {
                    triggerEditorMenu(e, e.touches[0].clientX, e.touches[0].clientY);
                }, 600);
            }
        }, { passive: false });
        editorElement.addEventListener('touchend', () => clearTimeout(editorPressTimer));
        editorElement.addEventListener('touchmove', () => clearTimeout(editorPressTimer));

        // Command Bindings for Workspace Context Options Actions
        document.getElementById('edit-ctx-copy').addEventListener('click', () => {
            document.execCommand('copy');
            hideContextMenu();
        });

        document.getElementById('edit-ctx-cut').addEventListener('click', () => {
            document.execCommand('cut');
            hideContextMenu();
        });

        document.getElementById('edit-ctx-paste').addEventListener('click', async () => {
            try {
                // Clipboard API read access fallback logic for modern secure frameworks
                const text = await navigator.clipboard.readText();
                cmInstance.replaceSelection(text);
            } catch (err) {
                // Fallback context execution message if system denies manual macro programmatic reads
                alert("Use your tablet's native paste pop-up button directly over the cursor point if clipboard reading access is restricted.");
            }
            hideContextMenu();
        });

        document.getElementById('edit-ctx-selectall').addEventListener('click', () => {
            cmInstance.execCommand('selectAll');
            hideContextMenu();
        });

        document.getElementById('edit-ctx-live').addEventListener('click', () => {
            toggleLiveServer();
            hideContextMenu();
        });

        // Virtual Filesystem Helper Operations
        function saveToStorage() {
            localStorage.setItem('v_ide_fs', JSON.stringify(fsData));
        }

        function generateId() {
            return 'node_' + Math.random().toString(36).substr(2, 9);
        }

        function findNode(id, node = fsData.root) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    let found = findNode(id, child);
                    if (found) return found;
                }
            }
            return null;
        }

        function deleteNode(id, node = fsData.root) {
            if (!node.children) return false;
            const index = node.children.findIndex(child => child.id === id);
            if (index !== -1) {
                node.children.splice(index, 1);
                return true;
            }
            for (let child of node.children) {
                if (deleteNode(id, child)) return true;
            }
            return false;
        }

        function renderTree() {
            explorerRoot.innerHTML = '';
            fsData.root.children.forEach(child => {
                explorerRoot.appendChild(createDOMNode(child));
            });
        }

        function createDOMNode(node) {
            const container = document.createElement('div');
            
            const item = document.createElement('div');
            item.className = `tree-item ${node.type === 'folder' ? 'tree-folder' : 'tree-file'}`;
            if (node.id === activeFileId) item.classList.add('active');
            item.dataset.id = node.id;
            
            const icon = document.createElement('span');
            icon.className = node.type === 'folder' ? 'icon-folder' : 'icon-file';
            
            const label = document.createElement('span');
            label.textContent = node.name;
            
            item.appendChild(icon);
            item.appendChild(label);
            container.appendChild(item);

            if (node.type === 'folder') {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'folder-children';
                childrenContainer.dataset.parentId = node.id;
                
                if (node.collapsed) childrenContainer.classList.add('collapsed');

                node.children.forEach(child => {
                    childrenContainer.appendChild(createDOMNode(child));
                });
                container.appendChild(childrenContainer);

                item.addEventListener('click', (e) => {
                    if (e.target.closest('.tree-item')) {
                        node.collapsed = !node.collapsed;
                        childrenContainer.classList.toggle('collapsed');
                        saveToStorage();
                    }
                });
            } else {
                item.addEventListener('click', () => {
                    selectFile(node.id);
                    if (window.innerWidth <= 600) sidebar.classList.remove('open');
                });
            }

            const triggerContextMenu = (e) => {
                e.preventDefault();
                e.stopPropagation();
                hideContextMenu();
                showContextMenu(e.clientX || (e.touches && e.touches[0].clientX), e.clientY || (e.touches && e.touches[0].clientY), node.id);
            };

            item.addEventListener('contextmenu', triggerContextMenu);
            
            let pressTimer;
            item.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    triggerContextMenu(e);
                }, 600);
            }, { passive: true });

            item.addEventListener('touchend', () => clearTimeout(pressTimer));
            item.addEventListener('touchmove', () => clearTimeout(pressTimer));

            return container;
        }

        function selectFile(id) {
            if (activeFileId) {
                const currentFile = findNode(activeFileId);
                if (currentFile) currentFile.content = cmInstance.getValue();
            }
            
            activeFileId = id;
            const file = findNode(id);
            
            let extension = file.name.split('.').pop().toLowerCase();
            let targetMode = "htmlmixed";
            if (extension === "js") targetMode = "javascript";
            if (extension === "css") targetMode = "css";
            
            cmInstance.setOption("mode", targetMode);
            cmInstance.setValue(file.content || '');
            fileTitle.textContent = file.name;
            
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`[data-id="${id}"]`);
            if (activeEl) activeEl.classList.add('active');
            saveToStorage();

            if (liveServerActive) updateLiveServer();
        }

        function createNewItem(type, parentId = 'root') {
            const name = prompt(`Enter ${type} name:`);
            if (!name) return;

            const targetParent = findNode(parentId);
            if (!targetParent || targetParent.type !== 'folder') return;

            const newItem = {
                id: generateId(),
                type: type,
                name: name,
                ...(type === 'folder' ? { children: [], collapsed: false } : { content: '' })
            };

            targetParent.children.push(newItem);
            saveToStorage();
            renderTree();
            
            if (type === 'file') {
                selectFile(newItem.id);
            }
        }

        function showContextMenu(x, y, itemId) {
            rightClickedItemId = itemId;
            const targetNode = findNode(itemId);
            
            const newFileOption = document.getElementById('ctx-new-file');
            newFileOption.style.display = targetNode.type === 'file' ? 'none' : 'block';

            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMenu.style.display = 'flex';
        }

        function hideContextMenu() {
            contextMenu.style.display = 'none';
            editorContextMenu.style.display = 'none';
        }

        document.getElementById('btn-new-folder').addEventListener('click', () => createNewItem('folder', 'root'));
        document.getElementById('btn-new-file').addEventListener('click', () => createNewItem('file', 'root'));
        
        document.getElementById('btn-save').addEventListener('click', () => {
            if (!activeFileId) return;
            const file = findNode(activeFileId);
            if (file) {
                file.content = cmInstance.getValue();
                saveToStorage();
            }
        });

        document.getElementById('ctx-new-file').addEventListener('click', () => {
            createNewItem('file', rightClickedItemId);
            hideContextMenu();
        });

        document.getElementById('ctx-rename').addEventListener('click', () => {
            const targetNode = findNode(rightClickedItemId);
            if (targetNode) {
                const newName = prompt("Rename element to:", targetNode.name);
                if (newName) {
                    targetNode.name = newName;
                    if (activeFileId === rightClickedItemId) fileTitle.textContent = newName;
                    saveToStorage();
                    renderTree();
                }
            }
            hideContextMenu();
        });

        document.getElementById('ctx-delete').addEventListener('click', () => {
            if (confirm("Are you sure you want to delete this item?")) {
                deleteNode(rightClickedItemId);
                if (activeFileId === rightClickedItemId) {
                    activeFileId = null;
                    cmInstance.setValue('');
                    fileTitle.textContent = 'No file open';
                }
                saveToStorage();
                renderTree();
            }
            hideContextMenu();
        });

        window.addEventListener('click', hideContextMenu);
        window.addEventListener('blur', hideContextMenu);

        renderTree();
    </script>
</body>
</html>
