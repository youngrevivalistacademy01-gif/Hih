<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IDE</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --toolbar-bg: #2d2d2d;
            --button-bg: #3c3c3c;
            --button-active: #0e639c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--toolbar-bg);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3c3c3c;
        }

        button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4d4d4d;
        }

        button:active {
            background-color: var(--button-active);
        }

        #file-status {
            font-size: 13px;
            color: #8a8a8a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        main {
            flex-grow: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: none;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px; /* 16px prevents iOS/Android auto-zoom on focus */
            line-height: 1.5;
            resize: none;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <button id="btn-open">Open File</button>
        <button id="btn-save">Save</button>
        <button id="btn-save-as">Save As...</button>
        <span id="file-status">No file open (Changes will be temporary)</span>
    </header>

    <main>
        <textarea id="editor" spellcheck="false" placeholder="Write or open your code here..."></textarea>
    </main>

    <script>
        let fileHandle = null;
        const editor = document.getElementById('editor');
        const btnOpen = document.getElementById('btn-open');
        const btnSave = document.getElementById('btn-save');
        const btnSaveAs = document.getElementById('btn-save-as');
        const fileStatus = document.getElementById('file-status');

        // Verify API Support (Fallback UI handled gracefully via alerts)
        const hasFileSystemAccess = 'showOpenFilePicker' in window;
        if (!hasFileSystemAccess) {
            fileStatus.textContent = "Local file saving limited on this browser. Use 'Save As' to download.";
        }

        async function openFile() {
            try {
                if (!hasFileSystemAccess) {
                    alert("Your browser doesn't support direct file system access. Copy/Paste code or switch to Chrome/Edge.");
                    return;
                }
                [fileHandle] = await window.showOpenFilePicker({
                    multiple: false
                });
                const file = await fileHandle.getFile();
                editor.value = await file.text();
                fileStatus.textContent = `Editing: ${file.name}`;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    alert('Error opening file.');
                }
            }
        }

        async function writeFile(handle, contents) {
            try {
                const writable = await handle.createWritable();
                await writable.write(contents);
                await writable.close();
                const file = await handle.getFile();
                fileStatus.textContent = `Saved: ${file.name}`;
            } catch (err) {
                console.error(err);
                alert('Failed to save changes.');
            }
        }

        async function saveFile() {
            if (fileHandle) {
                await writeFile(fileHandle, editor.value);
            } else {
                await saveFileAs();
            }
        }

        async function saveFileAs() {
            try {
                if (hasFileSystemAccess) {
                    fileHandle = await window.showSaveFilePicker();
                    await writeFile(fileHandle, editor.value);
                } else {
                    // Fallback for browsers/tablets lacking File System Access API
                    const blob = new Blob([editor.value], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'script.js';
                    a.click();
                    URL.revokeObjectURL(url);
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    alert('Error during Save As.');
                }
            }
        }

        // Event Listeners
        btnOpen.addEventListener('click', openFile);
        btnSave.addEventListener('click', saveFile);
        btnSaveAs.addEventListener('click', saveFileAs);

        // Keyboard Shortcuts (Ctrl + S / Cmd + S)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
        });
    </script>
</body>
</html>
